<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emojify</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="app-wide">
      <header class="app-header">
        <div style="display:flex;justify-content:space-between;align-items:baseline">
          <div>
            <div class="app-title">Emojify</div>
            <div class="app-subtitle">emoji mosaic generator</div>
          </div>
          <nav style="display:flex;gap:16px">
            <a href="/webcam" class="nav-link">webcam</a>
          </nav>
        </div>
      </header>

      <div class="two-col">
        <!-- Left: controls -->
        <div class="col-left">
          <div class="section">
            <div class="section-label">media</div>
            <div id="dropzone" class="dropzone">
              <input id="file" type="file" accept="video/*,image/*" />
              <span class="drop-title" id="drop-title">drop file here</span>
              <span class="drop-sub" id="drop-sub">or click to browse</span>
            </div>
          </div>

          <div class="section">
            <div class="section-label">options</div>
            <div class="controls">
              <label id="preset-control">
                preset
                <select id="preset">
                  <option value="custom">Custom</option>
                  <option value="fast">Fast</option>
                  <option value="balanced" selected>Balanced</option>
                  <option value="detail">High detail</option>
                </select>
              </label>
              <label id="fps-control">
                fps
                <input id="fps" type="number" min="1" max="30" value="8" />
              </label>
              <label>
                emoji size
                <input id="size" type="number" min="4" max="48" value="12" />
              </label>
              <label>
                format
                <select id="format">
                  <option value="mp4">MP4</option>
                  <option value="gif">GIF</option>
                </select>
              </label>
            </div>
          </div>

          <div class="button-row">
            <button id="process" class="btn primary">process</button>
          </div>

          <div class="status-bar">
            <div id="status" class="status-text">ready</div>
            <div class="progress-wrap" id="progress-wrap" style="display:none">
              <div class="bar"><span id="progress-bar"></span></div>
            </div>
          </div>
        </div>

        <!-- Right: preview -->
        <div class="col-right">
          <div class="preview-panel" id="preview-panel">
            <div class="preview-placeholder" id="preview-placeholder">
              <span>preview will appear here</span>
            </div>
            <div class="preview-content" id="preview-content" style="display:none"></div>
            <div class="preview-actions" id="preview-actions" style="display:none">
              <a id="download-link" class="btn" download>download</a>
            </div>
          </div>
        </div>
      </div>

      <div class="footer-text">
        made by humberto &middot;
        <a href="https://hubmerto.com" target="_blank" rel="noreferrer">hubmerto.com</a>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
